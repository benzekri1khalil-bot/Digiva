<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Digiva — My Dashboard</title>
<link rel="stylesheet" href="digiva.css"/>
<style>
body{background:var(--bg)}
.dash-layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.dash-side{background:var(--bg2);border-right:1px solid var(--border);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.dash-side-logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:16px}
.dash-nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .2s;text-decoration:none;border:none;background:none;width:100%}
.dash-nav-item:hover,.dash-nav-item.active{background:rgba(46,156,255,.1);color:var(--d5)}
.dash-main{padding:32px;background:var(--bg)}
.panel{display:none}.panel.active{display:block;animation:fadeUp .3s ease}
.profile-header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:16px;padding:28px;display:flex;align-items:center;gap:20px;margin-bottom:24px}
.profile-avatar{width:64px;height:64px;background:var(--grad2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;flex-shrink:0}
.profile-name{font-size:22px;font-weight:800;color:var(--text)}
.profile-email{font-size:13px;color:var(--text3)}
.cred-display{margin-left:auto;text-align:center;background:rgba(46,156,255,.08);border:1px solid rgba(46,156,255,.2);border-radius:12px;padding:14px 20px}
.cred-num{font-size:36px;font-weight:900;background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.cred-lbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.hist-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:border-color .2s}
.hist-row:hover{border-color:var(--d5)}
.hist-icon{width:36px;height:36px;background:rgba(46,156,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="dash-layout">
  <div class="dash-side">
    <div class="dash-side-logo">
      <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none">
        <div style="width:32px;height:32px;background:var(--grad2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff">D</div>
        <span style="font-size:17px;font-weight:800;background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Digiva</span>
      </a>
    </div>
    <button class="dash-nav-item active" onclick="showP('overview')">📊 Overview</button>
    <button class="dash-nav-item" onclick="showP('history')">📁 My Datasheets</button>
    <button class="dash-nav-item" onclick="showP('profile')">👤 My Profile</button>
    <button class="dash-nav-item" onclick="showP('credits')">🪙 Credits</button>
    <button class="dash-nav-item" onclick="showP('support')">💬 Support</button>
    <div style="margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);margin-top:20px">
      <button class="btn btn-secondary btn-sm btn-full" onclick="logout()">🚪 Sign Out</button>
    </div>
  </div>

  <div class="dash-main">
    <!-- OVERVIEW -->
    <div class="panel active" id="p-overview">
      <div class="profile-header" id="profileHeader"></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px" id="overviewStats"></div>
      <div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:14px">Recent Datasheets</div><div id="recentList"></div></div>
    </div>

    <!-- HISTORY -->
    <div class="panel" id="p-history">
      <div style="font-size:20px;font-weight:800;margin-bottom:20px">My Datasheets</div>
      <div id="historyList"></div>
    </div>

    <!-- PROFILE -->
    <div class="panel" id="p-profile">
      <div style="font-size:20px;font-weight:800;margin-bottom:20px">My Profile</div>
      <div class="card" style="max-width:500px">
        <div class="inp-group"><label class="inp-label">Full Name</label><input class="inp" id="p-name"/></div>
        <div class="inp-group"><label class="inp-label">Email</label><input class="inp" id="p-email" type="email"/></div>
        <hr class="form-divider"/>
        <div class="inp-group"><label class="inp-label">New Password</label><input class="inp" id="p-pass" type="password" placeholder="Leave blank to keep current"/></div>
        <div class="inp-group"><label class="inp-label">Confirm Password</label><input class="inp" id="p-pass2" type="password"/></div>
        <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>

    <!-- CREDITS -->
    <div class="panel" id="p-credits">
      <div style="font-size:20px;font-weight:800;margin-bottom:20px">Buy Credits</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px" id="plansGrid"></div>
      <div class="card" style="margin-top:20px;max-width:420px">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px">🎟 Have a Promo Code?</div>
        <div style="display:flex;gap:10px">
          <input class="inp" id="promo-inp" placeholder="Enter code..."/>
          <button class="btn btn-primary" onclick="applyPromo()">Apply</button>
        </div>
        <div id="promo-msg" style="font-size:13px;margin-top:8px"></div>
      </div>
    </div>

    <!-- SUPPORT -->
    <div class="panel" id="p-support">
      <div style="font-size:20px;font-weight:800;margin-bottom:20px">Support</div>
      <div class="card" style="max-width:560px">
        <div class="inp-group"><label class="inp-label">Subject</label><input class="inp" id="msg-sub" placeholder="What do you need help with?"/></div>
        <div class="inp-group"><label class="inp-label">Message</label><textarea class="inp" id="msg-body" rows="5" style="resize:vertical" placeholder="Describe your issue or question..."></textarea></div>
        <button class="btn btn-primary" onclick="sendSupport()">Send Message</button>
        <div id="msg-sent" style="display:none;margin-top:12px;color:var(--green);font-size:13px">✅ Message sent! We'll reply to your email soon.</div>
      </div>
    </div>
  </div>
</div>

<script src="digiva-core.js"></script>
<script>
requireAuth();
const me = currentUser();

function showP(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.dash-nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
  if(id==='overview') renderOverview();
  if(id==='history') renderHistory();
  if(id==='profile') loadProfile();
  if(id==='credits') renderPlans();
}

function renderOverview(){
  const user = currentUser();
  document.getElementById('profileHeader').innerHTML=`
    <div class="profile-avatar">${(user.name||'?')[0].toUpperCase()}</div>
    <div><div class="profile-name">${user.name}</div><div class="profile-email">${user.email}</div><div style="margin-top:6px"><span class="badge badge-blue">${user.role||'user'}</span></div></div>
    <div class="cred-display"><div class="cred-num">${user.credits||0}</div><div class="cred-lbl">Credits</div></div>`;
  const hist = user.history||[];
  document.getElementById('overviewStats').innerHTML=`
    <div class="card-sm"><div style="font-size:26px;font-weight:900;color:var(--d5)">${hist.length}</div><div style="font-size:12px;color:var(--text3);margin-top:4px">Total Generated</div></div>
    <div class="card-sm"><div style="font-size:26px;font-weight:900;color:var(--green)">${user.credits||0}</div><div style="font-size:12px;color:var(--text3);margin-top:4px">Credits Left</div></div>
    <div class="card-sm"><div style="font-size:26px;font-weight:900;color:var(--gold)">${hist.filter(h=>h.ok).length}</div><div style="font-size:12px;color:var(--text3);margin-top:4px">Successful</div></div>`;
  const recent = hist.slice(0,5);
  document.getElementById('recentList').innerHTML = recent.length ? recent.map(h=>`
    <div class="hist-row">
      <div class="hist-icon">📄</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--text)">${h.code}</div><div style="font-size:11px;color:var(--text3)">${h.category||'—'} · ${new Date(h.time).toLocaleDateString()}</div></div>
      ${h.url?`<a href="${h.url}" download="${h.fname||'datasheet.pptx'}" class="btn btn-primary btn-sm">⬇ Download</a>`:''}
    </div>`).join('') : '<div style="color:var(--text3);font-size:13px;padding:16px 0">No datasheets yet. <a href="index.html" style="color:var(--d5)">Generate your first one →</a></div>';
}

function renderHistory(){
  const user=currentUser();
  const hist=user.history||[];
  document.getElementById('historyList').innerHTML=hist.length?hist.map(h=>`
    <div class="hist-row">
      <div class="hist-icon">📄</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${h.code}</div><div style="font-size:11px;color:var(--text3)">${h.category||'—'} · ${new Date(h.time).toLocaleString()}</div></div>
      <span class="badge ${h.ok?'badge-green':'badge-red'}">${h.ok?'Done':'Error'}</span>
      ${h.url?`<a href="${h.url}" download="${h.fname||'datasheet.pptx'}" class="btn btn-primary btn-sm">⬇ PPTX</a>`:''}
    </div>`).join(''):'<div style="color:var(--text3);font-size:13px;text-align:center;padding:40px">No datasheets yet. <a href="index.html" style="color:var(--d5)">Generate one →</a></div>';
}

function loadProfile(){
  document.getElementById('p-name').value=me.name||'';
  document.getElementById('p-email').value=me.email||'';
}

function saveProfile(){
  const name=document.getElementById('p-name').value.trim();
  const pass=document.getElementById('p-pass').value;
  const pass2=document.getElementById('p-pass2').value;
  if(pass&&pass!==pass2){showToast('Passwords do not match','err');return;}
  const update={name};
  if(pass) update.passwordHash=simpleHash(pass);
  updateUser(me.id,update);
  showToast('Profile saved ✓','ok');
}

function renderPlans(){
  const cfg=getCfg();
  const plans=cfg.plans||DEFAULT_CFG.plans;
  const links=cfg.planLinks||{};
  const keys=['starter','pro','business'];
  document.getElementById('plansGrid').innerHTML=plans.map((p,i)=>`
    <div class="card" style="text-align:center">
      <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px">${p.name}</div>
      <div style="font-size:42px;font-weight:900;color:var(--text);letter-spacing:-2px;line-height:1;margin-bottom:4px"><sup style="font-size:18px;vertical-align:top;margin-top:8px">$</sup>${p.price}</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:16px">${p.credits} datasheets</div>
      <ul style="list-style:none;text-align:left;margin-bottom:20px">${(p.feats||[]).map(f=>`<li style="font-size:13px;color:var(--text2);padding:4px 0;display:flex;gap:8px"><span style="color:var(--green)">✓</span>${f}</li>`).join('')}</ul>
      <button class="btn btn-primary btn-full" onclick="buyPlan('${keys[i]}','${links[keys[i]]||''}',${p.credits})">Buy ${p.name}</button>
    </div>`).join('');
}

function buyPlan(plan,link,credits){
  if(link&&link.startsWith('http')){window.open(link,'_blank');showToast('Redirecting to payment...','ok');return;}
  showToast('Payment not configured yet. Contact support.','err');
}

function applyPromo(){
  const code=document.getElementById('promo-inp').value.trim().toUpperCase();
  const cfg=getCfg();
  const promos=cfg.promoCodes||{};
  const msg=document.getElementById('promo-msg');
  if(promos[code]){
    const bonus=promos[code];
    const user=currentUser();
    updateUser(user.id,{credits:(user.credits||0)+bonus});
    msg.style.color='var(--green)';
    msg.textContent='✓ +'+bonus+' credits added!';
    showToast('+'+bonus+' credits added ✓','ok');
  } else {
    msg.style.color='var(--red)';
    msg.textContent='✗ Invalid or expired code.';
  }
}

function sendSupport(){
  const sub=document.getElementById('msg-sub').value.trim();
  const body=document.getElementById('msg-body').value.trim();
  const user=currentUser();
  if(!sub||!body){showToast('Please fill in subject and message','err');return;}
  saveMessage(user.name,user.email,sub,body);
  document.getElementById('msg-sent').style.display='block';
  document.getElementById('msg-sub').value='';
  document.getElementById('msg-body').value='';
  showToast('Message sent ✓','ok');
}

renderOverview();
</script>
</body>
</html>
